<div class="container-fluid p-0 overflow-hidden">
  <div class="row g-0 vh-100">
    
    <div class="col-12 position-relative painel-conteudo d-flex align-items-center justify-content-center">
      
      <button class="btn botao-hamburguer position-absolute top-0 start-0 m-3 posicao-frente" 
              type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateralFord" aria-controls="menuLateralFord">
       <span style="font-size:30px;font-weight:bold;">☰</span>
      </button>

      <div class="mascara-verde"></div>

      <div class="card caixa-boasvindas shadow p-4 posicao-frente my-auto mx-auto animate-fade">
        <div class="card-body d-flex flex-column justify-content-center text-center">
          <h6 class="card-subtitle mb-2 text-muted cabecalho-cartao">Sistema de dados FORD</h6>
          <h3 class="card-title text-primary titulo-cartao mt-3">Seja bem vindo(a)!</h3>
        </div>
      </div>

    </div>

    <div class="offcanvas offcanvas-start painel-lateral" tabindex="-1" id="menuLateralFord" aria-labelledby="menuLateralFordLabel">
      
      <div class="offcanvas-header border-bottom py-4 d-flex justify-content-between align-items-center">
        <img src="ford.png" alt="Ford Logo" class="marca-lateral">
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      
      <div class="offcanvas-body d-flex flex-column justify-content-between">
        
        <nav class="nav flex-column">
          <a class="nav-link item-menu ativo-home" data-bs-dismiss="offcanvas" (click)="irParaHome()">Home</a>
          <a class="nav-link item-menu" data-bs-dismiss="offcanvas" (click)="irParaDashboard()">Dashboard</a>
        </nav>

        <div class="pb-3">
          <button class="btn btn-danger w-100 botao-sair fw-bold" data-bs-dismiss="offcanvas" (click)="efetuarLogout()">
            Sair do Sistema
          </button>
        </div>

      </div>

    </div>

  </div>
</div>
